data:
  modalities: ["flair", "t1ce"]
  num_patients_debug: 10
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  empty_ratio: 1.0

model:
  in_channels: 6
  out_channels: 2
  channels: [16, 32, 64, 128, 256]
  strides: [2, 2, 2, 2]
  dropout_prob: 0.3  # maybe try 0.1 later

training:
  batch_size: 16  # reduce to 8 if memory error
  learning_rate: 0.0001
  weight_decay: 0.00001
  epochs_debug: 20
  epochs_full: 40